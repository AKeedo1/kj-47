<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#17120a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cairn" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Cairn</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,400&family=Spectral:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Active screen (rendered by app.js per route) -->
  <main id="screen" class="screen"></main>

  <!-- Bottom tab bar -->
  <nav id="tabbar" class="tabbar" aria-label="Sections" hidden>
    <button class="tab" data-tab="home">Home</button>
    <button class="tab" data-tab="train">Train</button>
  </nav>

  <!-- Rest timer overlay (shared) -->
  <div id="rest" class="rest" role="dialog" aria-modal="true" aria-label="Rest timer" hidden>
    <div class="rest__panel">
      <p class="rest__label" id="rest-label">Rest</p>
      <p class="rest__time" id="rest-time">2:00</p>
      <p class="rest__next" id="rest-next"></p>
      <p class="rest__pr" id="rest-pr" aria-live="polite"></p>
      <div class="rest__actions">
        <button class="rest__btn" data-rest="-15">&minus;15</button>
        <button class="rest__btn rest__btn--skip" id="rest-skip">Skip</button>
        <button class="rest__btn" data-rest="30">&plus;30</button>
      </div>
    </div>
  </div>

  <script src="data/program.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
